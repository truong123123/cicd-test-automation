name: 🔴 TLU Login - Test Sai

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  tlu-login-fail:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Run Login Failure Test
        run: mvn test -Dtest=TluLoginTest#testLoginAccount1
        env:
          CI: true
