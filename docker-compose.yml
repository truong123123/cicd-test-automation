version: '3.8'

services:
  # ─── Production app ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: cicd-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  # ─── Development app with hot reload ─────────────────────────────────────
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: cicd-api-dev
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
    restart: unless-stopped
    profiles:
      - dev
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
